<!doctype html>
<html lang="fr">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Catalogue Motos</title>

<link rel="stylesheet" href="assets/style.css">

<script defer src="assets/catalogue-loader.js"></script>

</head>

<body>

<main class="main">

<div class="container">

<h1>🏍 Catalogue Motos</h1>

<div class="card">

<div class="row">

<div>
<label>Recherche</label>
<input class="input" id="q">
</div>

<div>
<label>Catégorie</label>
<select class="select" id="tag"></select>
</div>

</div>

<div class="row">

<div>
<label>Marque</label>
<select class="select" id="brand"></select>
</div>

<div>
<label>Trier</label>
<select class="select" id="sort">

<option value="">Par défaut</option>
<option value="price_asc">Prix croissant</option>
<option value="price_desc">Prix décroissant</option>

</select>

</div>

</div>

<div class="small">
<span id="count">0 résultat</span>
</div>

</div>

<div id="grid" class="grid grid-3"></div>

</div>

</main>

<script>

(async()=>{

const grid=document.getElementById("grid");
const qEl=document.getElementById("q");
const tagEl=document.getElementById("tag");
const brandEl=document.getElementById("brand");
const sortEl=document.getElementById("sort");
const countEl=document.getElementById("count");

const data=await loadCatalogue("data/motos.json");

fillTags(tagEl,data);
fillBrands(brandEl,data);

const run=()=>renderCatalogue({
data,
grid,
qEl,
tagEl,
brandEl,
sortEl,
countEl,
discordInvite:"https://discord.gg/ctzPkVGn5K"
});

qEl.oninput=run;
tagEl.onchange=run;
brandEl.onchange=run;
sortEl.onchange=run;

run();

})();

</script>

</body>
</html>
