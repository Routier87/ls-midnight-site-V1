<script>
(async ()=>{
  const grid = document.getElementById("grid");
  const qEl = document.getElementById("q");
  const tagEl = document.getElementById("tag");
  const brandEl = document.getElementById("brand");
  const sortEl = document.getElementById("sort");
  const countEl = document.getElementById("count");
  const discordInvite = "https://discord.gg/ctzPkVGn5K";

  try{
    const data = await loadCatalogue("data/bateaux.json"); // ✅ ICI
    fillTags(tagEl, data);
    fillBrands(brandEl, data);

    const run = () => renderCatalogue({data, grid, qEl, tagEl, brandEl, sortEl, countEl, discordInvite});
    qEl.addEventListener("input", run);
    tagEl.addEventListener("change", run);
    brandEl.addEventListener("change", run);
    sortEl.addEventListener("change", run);
    run();
  }catch(e){
    grid.innerHTML = `<div class="card"><div class="card-title">Erreur catalogue</div><p class="small">${escapeHtml(e.message)}</p></div>`;
  }
})();
</script>
